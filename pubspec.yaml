name: where_is_kenny
description: "Find Kenny from South Park! Distance tracker, soundboard, and 3D model explorer."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Location & Maps
  geolocator: ^13.0.2

  # Audio
  audioplayers: ^6.1.0

  # 3D Model Viewer
  model_viewer_plus: ^1.8.1

  # State Management
  provider: ^6.1.2

  # Utilities
  intl: ^0.20.2

  # HTTP for potential remote content
  http: ^1.2.2

  # Settings persistence
  shared_preferences: ^2.3.5

  # URL launcher for links
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.5

# App icon configuration
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#FF6B35"
  adaptive_icon_foreground: "assets/images/app_icon_foreground.png"

# Splash screen configuration
flutter_native_splash:
  color: "#FF6B35"
  android_12:
    color: "#FF6B35"
    image: "assets/images/splash_icon.png"
    icon_background_color: "#FF6B35"
  ios: true
  web: true

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/
    - assets/models/
    - assets/images/
    - assets/config/
