name: where_is_kenny
description: "Find Kenny from South Park! Distance tracker, soundboard, and 3D model explorer."
publish_to: 'none'
version: 1.0.0+16

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Location & Maps
  geolocator: ^13.0.2

  # Audio
  audioplayers: ^6.1.0

  # 3D Model Viewer
  model_viewer_plus: ^1.8.1

  # State Management
  provider: ^6.1.2

  # Utilities
  intl: ^0.20.2

  # HTTP for potential remote content
  http: ^1.2.2

  # Settings persistence
  shared_preferences: ^2.3.5

  # URL launcher for links
  url_launcher: ^6.3.0

  # Ads
  google_mobile_ads: ^5.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.5

# App icon configuration
# Using sharp-edged version to prevent blur from anti-aliased edges
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
  image_path: "assets/images/kenny_splash_icon.png"
  adaptive_icon_background: "#FF6B35"
  adaptive_icon_foreground: "assets/images/kenny_splash_icon.png"

# Splash screen configuration (native - shows before app loads)
# Using sharp-edged icon for crisp display
flutter_native_splash:
  color: "#1a1a2e"  # Dark background (matches app theme)
  image: "assets/images/kenny_splash_icon.png"
  android_gravity: center  # Center image without fill scaling
  ios_content_mode: center  # iOS: center without scaling
  web_image_mode: center  # Web: center the image
  fullscreen: true
  android: true
  ios: true
  web: true

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/
    - assets/models/
    - assets/images/
    - assets/config/
